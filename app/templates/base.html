<!-- app/templates/base.html -->
<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Titre dynamique : chaque page définit son propre titre -->
    <title>{% block title %}Edu.CRM{% endblock %}</title>

    <!-- Bootstrap 5 — pour le style sans écrire de CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f8f9fa;
      }
      .navbar-brand {
        font-weight: bold;
        letter-spacing: 1px;
      }
      .table th {
        background-color: #343a40;
        color: white;
      }
    </style>
  </head>

  <body>
    <!-- ================================ -->
    <!-- NAVBAR commune à toutes les pages -->
    <!-- ================================ -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="#">🎓 Edu.CRM</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="{{ url_for('students.list_students') }}">
            👨‍🎓 Étudiants
          </a>
          <!-- Les autres liens seront ajoutés par l'équipe -->
        </div>
      </div>
    </nav>

    <!-- ================================ -->
    <!-- FLASH MESSAGES                   -->
    <!-- Affichés automatiquement sur     -->
    <!-- toutes les pages qui héritent    -->
    <!-- ================================ -->
    <div class="container mt-3">
      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %} {% for category, message in messages %}
      <div
        class="alert alert-{{ category }} alert-dismissible fade show"
        role="alert"
      >
        {{ message }}
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>
      {% endfor %} {% endif %} {% endwith %}
    </div>

    <!-- ================================ -->
    <!-- CONTENU — chaque page remplit    -->
    <!-- ce bloc avec son propre contenu  -->
    <!-- ================================ -->
    {% block content %}{% endblock %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
