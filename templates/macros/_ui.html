{% macro form_input(name, label, type='text', placeholder='', value='', required=False, min=None, max=None) -%}
<div class="mb-4">
	<label for="{{ name }}" class="block text-sm font-semibold text-slate-700 mb-2">{{ label }}</label>
	<input
		type="{{ type }}"
		class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
		id="{{ name }}"
		name="{{ name }}"
		placeholder="{{ placeholder }}"
		value="{{ value }}"
		{% if min is not none %}min="{{ min }}"{% endif %}
		{% if max is not none %}max="{{ max }}"{% endif %}
		{% if required %}required{% endif %}
	/>
</div>
{%- endmacro %}

{% macro form_select(name, label, options, placeholder='Sélectionner', value='', required=False) -%}
<div class="mb-4">
	<label for="{{ name }}" class="block text-sm font-semibold text-slate-700 mb-2">{{ label }}</label>
	<select class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" id="{{ name }}" name="{{ name }}" {% if required %}required{% endif %}>
		<option value="">{{ placeholder }}</option>
		{% for option in options %}
		<option value="{{ option.id }}" {% if value and option.id == value %}selected{% endif %}>{{ option.name }}</option>
		{% endfor %}
	</select>
</div>
{%- endmacro %}
