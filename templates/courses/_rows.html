{% for course in courses %}
<tr class="border-b last:border-b-0 border-slate-200 hover:bg-slate-50">
    <td class="px-3 py-2.5 text-sm text-slate-900">{{ course.id }}</td>
    <td class="px-3 py-2.5 text-sm text-slate-900">{{ course.title }}</td>
    <td class="px-3 py-2.5 text-sm text-slate-900">{{ course.teacher_name }}</td>
    <td class="px-3 py-2.5 text-sm text-slate-900">{{ course.student_ids | length }}</td>
    <td class="px-3 py-2.5">
        <form action="{{ url_for('courses.delete', id=course.id) }}" method="POST" class="inline">
            <button type="submit" class="text-[11px] rounded-md px-2 py-1 border border-rose-300 text-rose-700"
                onclick="return confirm('Supprimer ce cours ?')">Supprimer</button>
        </form>
    </td>
</tr>
{% else %}
<tr>
    <td colspan="5" class="px-3 py-6 text-center text-sm text-slate-500">Aucun cours trouvé.</td>
</tr>
{% endfor %}
