{% extends "base.html" %}
{% block title %}Modifier un Cours — Edu.CRM{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="bg-white rounded-xl shadow-lg p-8">
    <div class="mb-8">
      <h2 class="text-2xl font-bold text-slate-900 mb-2">✏️ Modifier un cours</h2>
      <p class="text-slate-600">Modifiez les détails du cours ci-dessous.</p>
    </div>

    <form method="POST" action="{{ url_for('courses.update_course', course_id=course.id) }}" class="space-y-6">
      <!-- Title -->
      <div>
        <label for="title" class="block text-sm font-semibold text-slate-700 mb-2">Titre du cours</label>
        <input
          type="text"
          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
          id="title"
          name="title"
          value="{{ course.title }}"
          required
        />
      </div>

      <!-- Teacher -->
      <div>
        <label for="teacher_id" class="block text-sm font-semibold text-slate-700 mb-2">Enseignant</label>
        <select class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" 
          id="teacher_id" name="teacher_id">
          <option value="">— Aucun enseignant —</option>
          {% for teacher in teachers %}
          <option value="{{ teacher.id }}" {% if teacher.id == course.teacher_id %}selected{% endif %}>
            {{ teacher.name }} ({{ teacher.speciality }})
          </option>
          {% endfor %}
        </select>
      </div>

      <!-- Buttons -->
      <div class="flex gap-3 pt-4">
        <button type="submit" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-semibold py-3 rounded-lg transition duration-200">
          💾 Enregistrer
        </button>
        <a href="{{ url_for('courses.list_courses') }}" class="flex-1 bg-slate-300 hover:bg-slate-400 text-slate-900 font-semibold py-3 rounded-lg text-center transition duration-200">
          Annuler
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
