{% extends "base.html" %}
{% block title %}Modifier un Cours — Edu.CRM{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h2 class="mb-4">✏️ Modifier un cours</h2>

      <form method="POST" action="{{ url_for('courses.update_course', course_id=course.id) }}">
        <div class="mb-3">
          <label for="title" class="form-label fw-bold">Titre du cours</label>
          <input
            type="text"
            class="form-control"
            id="title"
            name="title"
            value="{{ course.title }}"
            required
          />
        </div>

        <div class="mb-3">
          <label for="teacher_id" class="form-label fw-bold">Enseignant</label>
          <select class="form-select" id="teacher_id" name="teacher_id">
            <option value="">— Aucun enseignant —</option>
            {% for teacher in teachers %}
            <option value="{{ teacher.id }}" {% if teacher.id == course.teacher_id %}selected{% endif %}>
              {{ teacher.name }} ({{ teacher.speciality }})
            </option>
            {% endfor %}
          </select>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-warning">💾 Enregistrer les modifications</button>
          <a href="{{ url_for('courses.list_courses') }}" class="btn btn-secondary">← Annuler</a>
        </div>
      </form>

    </div>
  </div>
</div>
{% endblock %}
