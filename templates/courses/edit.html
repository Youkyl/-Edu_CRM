{% extends "base.html" %}
{% block title %}Modifier un Cours — Edu.CRM{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="bg-white border border-slate-200 rounded-xl p-7">
    <div class="mb-6">
      <h2 class="text-xl font-semibold text-slate-900">Modifier un cours</h2>
      <p class="text-sm text-slate-600 mt-1">Modifiez les détails du cours ci-dessous.</p>
    </div>

    <form method="POST" action="{{ url_for('courses.update_course', course_id=course.id) }}" class="space-y-5">
      <div>
        <label for="title" class="block text-sm font-semibold text-slate-700 mb-2">Titre du cours</label>
        <input
          type="text"
          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
          id="title"
          name="title"
          value="{{ course.title }}"
          required
        />
      </div>

      <div>
        <label for="teacher_id" class="block text-sm font-semibold text-slate-700 mb-2">Enseignant</label>
        <select class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" 
          id="teacher_id" name="teacher_id">
          <option value="">— Aucun enseignant —</option>
          {% for teacher in teachers %}
          <option value="{{ teacher.id }}" {% if teacher.id == course.teacher_id %}selected{% endif %}>
            {{ teacher.name }} ({{ teacher.speciality }})
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="flex gap-2.5 pt-2">
        <button type="submit" class="flex-1 bg-amber-600 hover:bg-amber-700 text-white text-sm font-semibold py-2.5 rounded-lg transition">
          Enregistrer
        </button>
        <a href="{{ url_for('courses.list_courses') }}" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-800 text-sm font-semibold py-2.5 rounded-lg text-center transition">
          Annuler
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
