{% extends "base.html" %}
{% block title %}Modifier un Étudiant — Edu.CRM{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="bg-white border border-slate-200 rounded-xl p-7">
    <div class="mb-6">
      <h2 class="text-xl font-semibold text-slate-900">Modifier un étudiant</h2>
      <p class="text-sm text-slate-600 mt-1">Modifiez les informations de l'étudiant ci-dessous.</p>
    </div>

    <form method="POST" action="{{ url_for('students.update_student', student_id=student.id) }}" class="space-y-5">
      <div>
        <label for="name" class="block text-sm font-semibold text-slate-700 mb-2">Nom complet</label>
        <input
          type="text"
          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
          id="name"
          name="name"
          value="{{ student.name }}"
          required
        />
      </div>

      <div>
        <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">Email</label>
        <input
          type="email"
          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
          id="email"
          name="email"
          value="{{ student.email }}"
          required
        />
      </div>

      <div>
        <label for="age" class="block text-sm font-semibold text-slate-700 mb-2">Âge</label>
        <input
          type="number"
          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
          id="age"
          name="age"
          min="1"
          max="99"
          value="{{ student.age }}"
          required
        />
      </div>

      <div class="flex gap-2.5 pt-2">
        <button type="submit" class="flex-1 bg-amber-600 hover:bg-amber-700 text-white text-sm font-semibold py-2.5 rounded-lg transition">
          Enregistrer
        </button>
        <a href="{{ url_for('students.list_students') }}" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-800 text-sm font-semibold py-2.5 rounded-lg text-center transition">
          Annuler
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
