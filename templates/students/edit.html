{% extends "base.html" %}
{% block title %}Modifier un Étudiant — Edu.CRM{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="bg-white rounded-xl shadow-lg p-8">
    <div class="mb-8">
      <h2 class="text-2xl font-bold text-slate-900 mb-2">✏️ Modifier un étudiant</h2>
      <p class="text-slate-600">Modifiez les informations de l'étudiant ci-dessous.</p>
    </div>

    <form method="POST" action="{{ url_for('students.update_student', student_id=student.id) }}" class="space-y-6">
      <!-- Name -->
      <div>
        <label for="name" class="block text-sm font-semibold text-slate-700 mb-2">Nom complet</label>
        <input
          type="text"
          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
          id="name"
          name="name"
          value="{{ student.name }}"
          required
        />
      </div>

      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">Email</label>
        <input
          type="email"
          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
          id="email"
          name="email"
          value="{{ student.email }}"
          required
        />
      </div>

      <!-- Age -->
      <div>
        <label for="age" class="block text-sm font-semibold text-slate-700 mb-2">Âge</label>
        <input
          type="number"
          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
          id="age"
          name="age"
          min="1"
          max="99"
          value="{{ student.age }}"
          required
        />
      </div>

      <!-- Buttons -->
      <div class="flex gap-3 pt-4">
        <button type="submit" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-semibold py-3 rounded-lg transition duration-200">
          💾 Enregistrer
        </button>
        <a href="{{ url_for('students.list_students') }}" class="flex-1 bg-slate-300 hover:bg-slate-400 text-slate-900 font-semibold py-3 rounded-lg text-center transition duration-200">
          Annuler
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
