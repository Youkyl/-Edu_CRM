<!-- app/templates/students/create.html -->
{% extends "base.html" %} {% block title %}Ajouter un Étudiant — Edu.CRM{%
endblock %} {% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    {%if error != null %}
    <div style="color: red; justify-content: center">{{error}}</div>
    {% endif %}
    <div class="col-md-6">
      <h2 class="mb-4">Ajouter un étudiant</h2>

      <!--
                method="POST" → envoie les données à la route create_student
                action        → url_for génère /students/create
            -->

      <form method="POST" action="{{ url_for('students.create_student') }}">
        <div class="mb-3">
          <label for="name" class="form-label fw-bold">Nom complet</label>
          <input
            type="text"
            class="form-control"
            id="name"
            name="name"
            placeholder="Ex : Marie Curie"
            required
          />
        </div>

        <div class="mb-3">
          <label for="email" class="form-label fw-bold">Email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            placeholder="Ex : marie@edu.com"
            required
          />
        </div>

        <div class="mb-3">
          <label for="age" class="form-label fw-bold">Âge</label>
          <input
            type="number"
            class="form-control"
            id="age"
            name="age"
            min="1"
            max="99"
            placeholder="Ex : 20"
            required
          />
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-success">Enregistrer</button>
          <a
            href="{{ url_for('students.list_students') }}"
            class="btn btn-secondary"
          >
            ← Annuler
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
