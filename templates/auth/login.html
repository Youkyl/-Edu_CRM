{% extends "base.html" %}

{% block title %}Connexion — Edu.CRM{% endblock %}

{% block content %}
<div class="login-wrapper">
  <div class="login-card">
    <div class="card shadow-sm">
      <div class="card-body">
        <div class="mb-4">
          <h1 class="h4 mb-1">Bienvenue sur Edu.CRM</h1>
          <p class="text-body-secondary mb-0">Connecte-toi pour accéder à la plateforme.</p>
        </div>
        <form method="POST" action="{{ url_for('auth.login') }}">
          <div class="mb-3">
            <label class="form-label" for="username">Nom d'utilisateur</label>
            <input class="form-control" id="username" name="username" required />
          </div>
          <div class="mb-3">
            <label class="form-label" for="password">Mot de passe</label>
            <input type="password" class="form-control" id="password" name="password" required />
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Se connecter</button>
          </div>
        </form>
        <hr>
        <small class="text-body-secondary d-block">
          Comptes test: etudiant/1234, prof/1234, admin/1234
        </small>
      </div>
    </div>
  </div>
</div>
{% endblock %}
