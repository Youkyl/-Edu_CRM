{% extends "base.html" %}

{% block title %}Espace utilisateur — Edu.CRM{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-body">
        <h2 class="h4 mb-3">Bienvenue {{ user }}</h2>
        <p class="mb-3">Rôle connecté : <strong>{{ role }}</strong></p>
        <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-danger">Se déconnecter</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
