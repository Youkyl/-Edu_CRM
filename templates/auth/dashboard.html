{% extends "base.html" %}

{% block title %}Espace utilisateur — Edu.CRM{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="bg-white rounded-xl shadow-lg p-8">
    <h2 class="text-2xl font-bold text-slate-900 mb-4">Bienvenue {{ user }}</h2>
    <p class="text-slate-700 mb-6 text-lg">
      Rôle connecté : <span class="font-semibold bg-blue-100 text-blue-800 px-3 py-1 rounded-full">{{ role }}</span>
    </p>
    <a href="{{ url_for('auth.logout') }}" class="inline-block bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-lg font-semibold transition">
      Se déconnecter
    </a>
  </div>
</div>
{% endblock %}
